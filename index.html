<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
color:white;
overflow-x:hidden;
}

/* Ribbon */
.ribbon-wrapper{
position:fixed;
width:100%;
height:100%;
background:#ff6a88;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
cursor:pointer;
overflow:hidden;
}

.ribbon{
position:relative;
width:80%;
height:120px;
background:linear-gradient(45deg,#b30000,#ff1a1a,#b30000);
border-radius:60px;
display:flex;
align-items:center;
justify-content:center;
animation:wave 3s infinite ease-in-out;
box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

.ribbon-text{
font-size:28px;
font-weight:700;
animation:textWave 2s infinite ease-in-out;
}

@keyframes wave{
0%{transform:rotate(0deg);}
50%{transform:rotate(1deg);}
100%{transform:rotate(0deg);}
}

@keyframes textWave{
0%{transform:translateY(0);}
50%{transform:translateY(-5px);}
100%{transform:translateY(0);}
}

/* Main */
.main{
display:none;
flex-direction:column;
align-items:center;
padding:80px 20px 140px;
width:100%;
text-align:center;
}

.typewriter{
font-size:28px;
font-weight:600;
margin-bottom:40px;
min-height:40px;
}

/* Grid */
.grid{
display:grid;
grid-template-columns:repeat(3,120px);
gap:25px;
justify-content:center;
}

.card{
width:120px;
height:120px;
position:relative;
transform-style:preserve-3d;
transition:transform 0.8s;
cursor:pointer;
}

.card.flip{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
backface-visibility:hidden;
box-shadow:0 15px 25px rgba(0,0,0,0.3);
}

.front{
background:white;
color:#ff4081;
font-size:40px;
}

.back{
background:#fff;
color:#ff4081;
transform:rotateY(180deg);
padding:10px;
font-size:13px;
text-align:center;
}

/* Password */
.password-section{
margin-top:40px;
}

.password-section input{
padding:10px;
border:none;
border-radius:8px;
}

.password-section button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#ff4081;
color:white;
cursor:pointer;
margin-left:5px;
}

/* Rock Popup */
.rock-popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
color:#ff4081;
padding:50px;
border-radius:25px;
font-size:30px;
font-weight:800;
text-align:center;
z-index:20;
transition:0.4s;
}

.rock-popup.active{
transform:translate(-50%,-50%) scale(1);
}

.close-btn{
position:absolute;
top:10px;
right:15px;
cursor:pointer;
font-size:20px;
}

/* Video Modal */
.video-modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:30;
}

.video-modal iframe{
width:90%;
max-width:600px;
height:350px;
border-radius:15px;
}

.video-close{
position:absolute;
top:20px;
right:30px;
color:white;
font-size:28px;
cursor:pointer;
}

/* Music Button */
.music-btn{
position:fixed;
top:20px;
right:20px;
background:white;
color:#ff4081;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
font-weight:600;
}

/* Footer */
footer{
position:fixed;
bottom:0;
width:100%;
background:rgba(0,0,0,0.25);
padding:12px;
display:flex;
justify-content:center;
align-items:center;
gap:15px;
backdrop-filter:blur(6px);
font-size:14px;
}

.instagram{
background:white;
color:#ff4081;
width:35px;
height:35px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
font-size:18px;
}
</style>
</head>

<body>

<div class="ribbon-wrapper" onclick="cutRibbon()">
<div class="ribbon">
<div class="ribbon-text">Click the ribbon to cut it</div>
</div>
</div>

<div class="main">
<div class="typewriter" id="typewriter"></div>
<div class="grid" id="grid"></div>

<div class="password-section">
<p>Enter secret code to unlock final surprise</p>
<input type="password" id="secret">
<button onclick="checkPassword()">Unlock</button>
</div>
</div>

<div class="rock-popup" id="rockPopup">
<div class="close-btn" onclick="closeRock()">✖</div>
ROCK ONNN 🎉  
<br>Its Your Birthday Superstar
</div>

<div class="video-modal" id="videoModal" onclick="closeVideo()">
<div class="video-close">✖</div>
<iframe id="birthdayVideo"
src="https://www.youtube.com/embed/ITBRCHsR1PU"
frameborder="0"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
</div>

<div class="music-btn" onclick="toggleMusic()">Music</div>

<audio id="bgMusic" loop>
<source src="birthday.mp3" type="audio/mp3">
</audio>

<footer>
<span>2026 @ Yarnnest</span>
<a class="instagram" href="https://www.instagram.com/yarn.nest_official/" target="_blank">📷</a>
</footer>

<script>

const name="Birthday Star";
const password="mylove2026";

const wishes=[
"You are my greatest blessing ❤️",
"Your smile is my favorite sight",
"More dreams more victories",
"Stay fearless always",
"You deserve everything beautiful",
"Keep glowing brighter",
"Endless love for you",
"Adventure and success ahead",
"Ultimate celebration unlocked"
];

let flippedCount=0;

function cutRibbon(){
document.querySelector(".ribbon-wrapper").style.display="none";
document.querySelector(".main").style.display="flex";
typeWriter(`Happy Birthday ${name} 🎂`);
generateCards();
document.getElementById("bgMusic").play();
}

function typeWriter(text){
let i=0;
function typing(){
if(i<text.length){
document.getElementById("typewriter").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,60);
}
}
typing();
}

function generateCards(){
const grid=document.getElementById("grid");
grid.innerHTML="";
for(let i=0;i<9;i++){
let card=document.createElement("div");
card.className="card";
card.onclick=function(){
if(!card.classList.contains("flip")){
card.classList.add("flip");
flippedCount++;
if(flippedCount===9){
document.getElementById("rockPopup").classList.add("active");
}
}
};

let front=document.createElement("div");
front.className="front";
front.innerHTML="🎁";

let back=document.createElement("div");
back.className="back";
back.innerHTML=wishes[i];

card.appendChild(front);
card.appendChild(back);
grid.appendChild(card);
}
}

function closeRock(){
document.getElementById("rockPopup").classList.remove("active");
}

function checkPassword(){
if(document.getElementById("secret").value===password){
document.getElementById("videoModal").style.display="flex";
}
else{
alert("Wrong secret code");
}
}

function closeVideo(){
let modal=document.getElementById("videoModal");
let iframe=document.getElementById("birthdayVideo");
modal.style.display="none";
iframe.src=iframe.src;
}

function toggleMusic(){
let music=document.getElementById("bgMusic");
music.paused?music.play():music.pause();
}

</script>

</body>
</html>
